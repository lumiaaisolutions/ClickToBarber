services:
  postgres:
    image: postgres:16-alpine
    container_name: barberpro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: barberpro
      POSTGRES_USER: barberpro
      POSTGRES_PASSWORD: barberpro_dev
    ports:
      - "5433:5432"
    volumes:
      - barberpro_pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barberpro -d barberpro"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: barberpro-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - barberpro_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: barberpro-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit:latest
    container_name: barberpro-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # UI

volumes:
  barberpro_pgdata:
  barberpro_redisdata:
