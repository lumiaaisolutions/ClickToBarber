# LUMIA frontend — configuración Fly.io.
#
# Antes de deploy:
#   1. fly launch --no-deploy --copy-config
#   2. fly secrets set BARBERPRO_API_URL=https://api.lumia.app/api \
#                      NEXT_PUBLIC_API_URL=https://api.lumia.app/api \
#                      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_live_...
#   3. fly deploy --dockerfile Dockerfile.prod

app = "lumia-app"
primary_region = "scl"

[build]
  dockerfile = "Dockerfile.prod"

[env]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
